on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  run_forecast:
    runs-on: ubuntu-latest
    container:
      image: eco4cast/rocker-neon4cast

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Install only missing modeling packages
        run: |
          Rscript -e 'pkgs <- c(
            "tidyverse",
            "lubridate",
            "neon4cast",
            "scoringRules",
            "arrow",
            "workflows",
            "recipes",
            "parsnip",
            "ranger"
          ); missing <- pkgs[!sapply(pkgs, requireNamespace, quietly = TRUE)]; if (length(missing) > 0) install.packages(missing, repos="https://cloud.r-project.org")'

      - name: Run forecasts site by site
        run: |
          sites=(
            ABBY BARR BART BLAN BONA
            CLBJ CPER DCFS DEJU DELA
            DSNY GRSM GUAN HARV HEAL
            JERC JORN KONA KONZ LAJA
            LENO MLBS MOAB NIWO NOGP
            OAES ONAQ ORNL OSBS PUUM
            RMNP SCBI SERC SJER SOAP
            SRER STEI STER TALL TEAK
            TOOL TREE UKFS UNDE WOOD
            WREF YELL
          )

          for site in "${sites[@]}"; do
            echo "======================================"
            echo "Running forecast for site: $site"
            echo "======================================"
            Rscript neon4cast/NEE_forecast.R "$site"
          done
