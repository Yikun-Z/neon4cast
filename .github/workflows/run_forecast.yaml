on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  run_forecast:
    runs-on: ubuntu-latest
    container:
      image: eco4cast/rocker-neon4cast

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Install only missing modeling packages
        run: |
          Rscript -e 'pkgs <- c(
            "tidyverse",
            "lubridate",
            "neon4cast",
            "scoringRules",
            "arrow",
            "workflows",
            "recipes",
            "parsnip",
            "ranger"
          ); missing <- pkgs[!sapply(pkgs, requireNamespace, quietly = TRUE)]; if (length(missing) > 0) install.packages(missing, repos="https://cloud.r-project.org")'

      - name: Run forecasts site by site
        run: |
          failed_sites=""

          for site in ABBY BARR BART BLAN BONA \
                      CLBJ CPER DCFS DEJU DELA \
                      DSNY GRSM GUAN HARV HEAL \
                      JERC JORN KONA KONZ LAJA \
                      LENO MLBS MOAB NIWO NOGP \
                      OAES ONAQ ORNL OSBS PUUM \
                      RMNP SCBI SERC SJER SOAP \
                      SRER STEI STER TALL TEAK \
                      TOOL TREE UKFS UNDE WOOD \
                      WREF YELL
          do
            echo "======================================"
            echo "Running forecast for site: $site"
            echo "======================================"

            if Rscript neon4cast/NEE_forecast.R "$site"; then
              echo "Success: $site"
            else
              echo "Failed: $site"
              failed_sites="$failed_sites $site"
            fi
          done

          if [ -n "$failed_sites" ]; then
            echo "Some sites failed:$failed_sites"
            exit 1
          fi
          
      - name: Combine site forecasts
        run: |
          Rscript -e 'library(tidyverse); files <- list.files("site_forecasts", pattern = "\\.csv$", full.names = TRUE); final <- map_dfr(files, read_csv, show_col_types = FALSE); out_file <- paste0("terrestrial_daily-", as.Date(Sys.time(), tz = "UTC") - 2, "-rf_hybrid_model.csv"); write_csv(final, out_file); message("Combined file: ", out_file); message("Rows: ", nrow(final)); message("Sites: ", n_distinct(final$site_id))'

      - name: Submit combined forecast
        run: |
          Rscript -e 'forecast_file <- paste0("terrestrial_daily-", as.Date(Sys.time(), tz = "UTC") - 2, "-rf_hybrid_model.csv"); neon4cast::submit(forecast_file = forecast_file)'
